name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  # Make sure every PR has its own concurrency group, so that multiple PRs can run in parallel.
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  style_windows:
    name: Windows style
    runs-on: [self-hosted, Windows]

    steps:
      - name: Enable long paths
        shell: powershell
        run: |
          git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: Install Git LFS
        run: git lfs install --local --force

      - name: LFS Pull
        run: |
          # Github's extraHeader auth cred should only be sent on the fisrt lfs request
          $AUTH_HEADER = & git config --local http.${{ github.server_url }}/.extraheader}
          git config --local --unset http.${{ github.server_url }}/.extraheader
          git config --local http.${{ github.server_url }}.git/info/lfs/objects/batch.extraheader "$AUTH_HEADER"
          git lfs pull

      - name: Add LLVM to PATH
        shell: powershell
        run: |
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add Ninja to PATH
        shell: powershell
        run: |
          "C:\Ninja" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Check formatting
        shell: powershell
        run: |
          .\run-clang-format.ps1

      - name: Check clang-tidy
        shell: powershell
        run: |
          .\run-clang-tidy.ps1 --local

  windows_unit_tests:
    name: Windows release static unit tests
    needs: style_windows
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: Install Git LFS
        run: git lfs install --local --force

      - name: LFS Pull
        run: |
          # Github's extraHeader auth cred should only be sent on the fisrt lfs request
          $AUTH_HEADER = & git config --local http.${{ github.server_url }}/.extraheader}
          git config --local --unset http.${{ github.server_url }}/.extraheader
          git config --local http.${{ github.server_url }}.git/info/lfs/objects/batch.extraheader "$AUTH_HEADER"
          git lfs pull

      - name: Configure CMake
        shell: powershell
        run: |
          cmake --preset windows-release-static

      - name: Build GoogleTest unit binary
        shell: powershell
        run: |
          cmake --build --preset windows-release-static --target kera_unit_tests --config Release -- /m:1

      - name: Run quick validation
        shell: powershell
        run: |
          ctest --test-dir build/windows-release-static -C Release -L quick --output-on-failure

  windows_vulkan_smoke:
    name: Windows release shared Vulkan smoke
    needs: windows_unit_tests
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: false

      - name: Install Git LFS
        run: git lfs install --local --force

      - name: LFS Pull
        run: |
          # Github's extraHeader auth cred should only be sent on the fisrt lfs request
          $AUTH_HEADER = & git config --local http.${{ github.server_url }}/.extraheader}
          git config --local --unset http.${{ github.server_url }}/.extraheader
          git config --local http.${{ github.server_url }}.git/info/lfs/objects/batch.extraheader "$AUTH_HEADER"
          git lfs pull

      - name: Configure CMake
        shell: powershell
        run: |
          cmake --preset windows-release-shared

      - name: Build samples
        shell: powershell
        run: |
          cmake --build --preset windows-release-shared --target kera_samples --config Release -- /m:1
          cmake --build --preset windows-release-shared --target kera_ppm_metrics --config Release -- /m:1

      - name: Run Vulkan smoke tests
        shell: powershell
        env:
          KERA_RUN_GPU_SMOKE: "1"
        run: |
          ctest --test-dir build/windows-release-shared -C Release -L vulkan --output-on-failure

      - name: Upload Vulkan smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-vulkan-smoke-diagnostics
          path: |
            build/windows-release-shared/samples/Release/*.log
            build/windows-release-shared/samples/Release/visual_regression/**
          if-no-files-found: ignore
          retention-days: 7
